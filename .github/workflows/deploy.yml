name: "CI/CD pipeline for SimpleLR"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install -r requirements.txt
         pip install pytest

      - name: Run tests
        run: |
          pytest tests/test_api.py
          python -c "import fastapi; import joblib; import mysql.connector; print('All imports successfully!')"


