name: CI/CD pipeline for the simpleLinearRegression

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      
      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Run tests
        run: |
          pytest tests/test_api.py
          python -c "import fastapi; import joblib; print('All import successfully!')"

  build:
    needs: test # only run if test passes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Docker Buildx
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/height-prediction:latest
            ${{ secrets.DOCKER_USERNAME }}/height-prediction:${{ github.sha }}
          cache-from: type=registry, ref=${{ secrets.DOCKER_USERNAME }}/height-prediction:buildcache
          cache-to: type=registry, ref=${{ secrets.DOCKER_USERNAME }}/height-prediction:buildcache,mode=max